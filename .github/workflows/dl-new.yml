name: Auto Download Files

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Download URLs separated by space"
        required: true
        type: string
      mode:
        description: "Download mode"
        required: true
        type: choice
        options:
          - normal
          - zip
      password:
        description: "ZIP password (only for zip mode)"
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 curl zip bc

      - name: Configure git for large files
        run: |
          git config http.postBuffer 524288000

      - name: Download files
        shell: bash
        run: |
          set -e

          MODE="${{ inputs.mode }}"
          URLS="${{ inputs.urls }}"
          PASSWORD="${{ inputs.password }}"

          # Directory setup
          if [[ "$MODE" == "zip" ]]; then
            WORKDIR="$(mktemp -d)"
          else
            WORKDIR="."
          fi

          echo "Working directory: $WORKDIR"

          # Function: sanitize filename
          sanitize_filename() {
            local name="$1"
            name="$(printf '%b' "${name//%/\\x}")"     # URL decode
            name="${name%%\?*}"                         # remove query
            name="${name%%\#*}"                         # remove fragment
            name="$(basename "$name")"
            name="$(echo "$name" | tr -cd '[:alnum:]._- ')"
            echo "$name"
          }

          # Function: download with retries
          download_file() {
            local url="$1"
            local filename="$2"
            local attempt
            local delays=(5 15 45)
            local error_msg=""

            for attempt in 1 2 3; do
              echo "Attempt $attempt: Downloading $filename"

              if aria2c \
                --max-connection-per-server=16 \
                --split=16 \
                --min-split-size=1M \
                --max-tries=5 \
                --retry-wait=3 \
                --timeout=60 \
                --connect-timeout=30 \
                -o "$filename" "$url"; then
                echo "Downloaded successfully with aria2c"
                return 0
              fi

              echo "aria2c failed, trying curl..."

              if curl -L -C - \
                --retry 3 \
                --retry-delay 5 \
                --max-time 3600 \
                -o "$filename" "$url"; then
                echo "Downloaded successfully with curl"
                return 0
              fi

              error_msg="Download failed on attempt $attempt"
              echo "$error_msg"
              sleep "${delays[$((attempt-1))]}"
            done

            # If all attempts failed, write error file
            echo -e "URL: $url\nError: $error_msg" > "${filename}_ERROR.txt"
            echo "All attempts failed for $filename"
          }

          # Main loop
          for url in $URLS; do
            raw_name="$(basename "$url")"
            clean_name="$(sanitize_filename "$raw_name")"
            echo "Processing URL: $url"
            echo "Resolved filename: $clean_name"
            download_file "$url" "$WORKDIR/$clean_name"
          done

          # ZIP mode handling
          if [[ "$MODE" == "zip" ]]; then
            cd "$(dirname "$WORKDIR")"

            PASSWORD_FLAG=""
            if [[ -n "$PASSWORD" ]]; then
              PASSWORD_FLAG="-P $PASSWORD"
            fi

            echo "Creating ZIP archive..."
            zip -r -s 45m $PASSWORD_FLAG output.zip "$(basename "$WORKDIR")"
          fi

      - name: Commit and push changes
        run: |
          set -e
          git add .
          TIMESTAMP="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git commit -m "Downloaded files on $TIMESTAMP" || echo "Nothing to commit"
          git push --force
