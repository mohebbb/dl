name: Personal File Downloader (RAR)

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'لینک مستقیم دانلود فایل'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y rar

      - name: Setup Environment
        run: |
          mkdir -p downloads
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Download File
        run: |
          URL="${{ github.event.inputs.download_url }}"
          # استخراج نام فایل از URL
          FILENAME=$(basename "$URL" | cut -d'?' -f1)
          
          if ! curl -L -f -o "downloads/$FILENAME" "$URL"; then
            echo "خطا در دانلود فایل"
            exit 1
          fi
          
          echo "FILE_PATH=downloads/$FILENAME" >> $GITHUB_ENV
          echo "FILE_NAME=$FILENAME" >> $GITHUB_ENV

      - name: Compress and Split (RAR)
        run: |
          cd downloads
          # -v100m: حجم هر پارت 100 مگابایت
          # -m0: حالت Store (بدون فشرده‌سازی اضافه برای سرعت بالاتر، اگر فایل قبلا فشرده بوده)
          # برای فشرده‌سازی قوی‌تر از -m5 استفاده کنید
          rar a -v100m -m0 "${{ env.FILE_NAME }}.rar" "${{ env.FILE_NAME }}"
          
          # حذف فایل اصلی پس از ایجاد آرشیوهای RAR
          rm "${{ env.FILE_NAME }}"
          cd ..

      - name: List Output Files
        run: ls -lh downloads/

      - name: Commit and Push
        run: |
          git add downloads/
          if ! git diff --cached --quiet; then
            git commit -m "Auto-download and Split: ${{ env.FILE_NAME }}"
            git push
          fi
